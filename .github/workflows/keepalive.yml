name: Keepalive - 防止 GitHub 禁用定时任务

on:
  schedule:
    # 每周一 UTC 0:00 (北京周一 8:00) 运行一次，保持仓库活跃
    - cron: '0 0 * * 1'

jobs:
  keepalive:
    runs-on: ubuntu-latest
    permissions:
      actions: write
    steps:
      - name: 保持仓库活跃
        uses: actions/github-script@v7
        with:
          script: |
            // 重新启用所有可能被 GitHub 自动禁用的 scheduled workflows
            const workflows = await github.rest.actions.listRepoWorkflows({
              owner: context.repo.owner,
              repo: context.repo.repo,
            });
            for (const wf of workflows.data.workflows) {
              if (wf.state === 'disabled_inactivity') {
                console.log(`Re-enabling workflow: ${wf.name}`);
                await github.rest.actions.enableWorkflow({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  workflow_id: wf.id,
                });
              }
            }
            console.log('Keepalive check done.');
